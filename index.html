<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sheepy Sleep</title>
  <style>
    :root{
      --bg1:#08101c;
      --bg2:#0f1b2d;
      --card:rgba(255,255,255,0.08);
      --line:rgba(255,255,255,0.14);
      --text:#f5f7fb;
      --sub:rgba(255,255,255,0.68);
      --soft:rgba(255,255,255,0.4);
      --accent:#b7d3ff;
      --accent2:#dce9ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 80% 12%, rgba(255,232,177,0.18), transparent 16%),
        radial-gradient(circle at 20% 20%, rgba(120,160,255,0.10), transparent 20%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
      overflow:hidden;
    }
    .stars{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }
    .star{
      position:absolute;
      width:2px;
      height:2px;
      border-radius:50%;
      background:#fff;
      opacity:.4;
      animation:twinkle linear infinite;
    }
    @keyframes twinkle{
      0%,100%{opacity:.15}
      50%{opacity:.8}
    }
    .wrap{
      position:relative;
      z-index:1;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card{
      width:min(92vw,520px);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      backdrop-filter:blur(8px);
      padding:28px 22px;
      text-align:center;
    }
    h1{
      margin:6px 0 8px;
      font-size:42px;
      font-weight:700;
      letter-spacing:.04em;
    }
    .sub{
      color:var(--sub);
      margin:0 0 22px;
      font-size:14px;
      letter-spacing:.12em;
    }
    .badge{
      display:inline-block;
      padding:8px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--sub);
      font-size:13px;
      margin-bottom:20px;
    }
    .controls{
      display:grid;
      gap:14px;
      margin:20px 0;
      text-align:left;
    }
    label{
      display:block;
      color:var(--sub);
      font-size:13px;
      margin-bottom:8px;
    }
    select,input[type="range"]{
      width:100%;
    }
    select{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      font-size:14px;
    }
    input[type="range"]{
      accent-color:#d7e6ff;
    }
    .btns{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:22px;
    }
    button{
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:14px 24px;
      font-size:15px;
      font-weight:700;
      letter-spacing:.08em;
      transition:.2s ease;
    }
    button:hover{transform:translateY(-1px)}
    .primary{
      background:linear-gradient(180deg,#dce9ff,#b7d3ff);
      color:#10203c;
    }
    .ghost{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid var(--line);
    }
    .sleep-screen{
      position:fixed;
      inset:0;
      z-index:2;
      display:none;
    }
    .sleep-screen.active{display:block}
    .topbar{
      position:absolute;
      top:18px;
      left:18px;
      right:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:4;
    }
    .counter{
      color:var(--sub);
      font-size:13px;
      letter-spacing:.15em;
      text-transform:uppercase;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:10px 14px;
    }
    .stop{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid var(--line);
      padding:10px 16px;
      font-size:12px;
    }
    .whisper{
      position:absolute;
      top:18%;
      left:50%;
      transform:translateX(-50%);
      width:90%;
      text-align:center;
      color:rgba(255,255,255,.9);
      font-size:clamp(24px,4vw,40px);
      letter-spacing:.12em;
      text-shadow:0 0 30px rgba(180,210,255,.35);
      opacity:0;
      transition:opacity .9s ease;
      z-index:4;
      pointer-events:none;
    }
    .whisper.show{opacity:1}
    .field{
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:3;
    }
    .sheep{
      position:absolute;
      transform:translate(-50%,-50%);
      animation:floatY 4.5s ease-in-out infinite;
      filter:drop-shadow(0 8px 20px rgba(0,0,0,.22));
    }
    @keyframes floatY{
      0%,100%{transform:translate(-50%,-50%) translateY(0)}
      50%{transform:translate(-50%,-50%) translateY(-8px)}
    }
    .breath{
      position:absolute;
      left:50%;
      bottom:80px;
      transform:translateX(-50%);
      text-align:center;
      z-index:4;
      color:rgba(255,255,255,.35);
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
    }
    .ring{
      width:38px;
      height:38px;
      border:1.5px solid rgba(255,255,255,.28);
      border-radius:50%;
      margin:0 auto 10px;
      transition:all 4.2s ease-in-out;
    }
    .ring.in{
      width:70px;
      height:70px;
    }
    .result{
      position:fixed;
      inset:0;
      z-index:5;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(5,10,18,.72);
      backdrop-filter:blur(6px);
    }
    .result.active{display:flex}
    .result-card{
      width:min(92vw,420px);
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      border-radius:26px;
      padding:28
